<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Cofre Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --text: #e8e4d8;
    --muted: #7a7880;
    --danger: #c0392b;
    --success: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* AUTH SCREEN */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 0%, #1a1500 0%, var(--bg) 60%);
  }

  .auth-box {
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s ease both;
  }

  .logo {
    text-align: center;
    margin-bottom: 3rem;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.2rem;
    background: linear-gradient(135deg, #2a2000, #1a1500);
    border: 1px solid var(--gold);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 1px 0 rgba(201,168,76,0.2);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 1px 0 rgba(201,168,76,0.2); }
    50% { box-shadow: 0 0 60px rgba(201,168,76,0.3), inset 0 1px 0 rgba(201,168,76,0.3); }
  }

  .logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold2);
    letter-spacing: -0.02em;
  }

  .logo p {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .tab-btn {
    flex: 1;
    padding: 0.75rem;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--gold);
    color: #0a0800;
    font-weight: 500;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  textarea { resize: vertical; min-height: 80px; }

  select option { background: var(--surface2); }

  .btn {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, var(--gold), #a8863a);
    border: none;
    border-radius: 8px;
    color: #0a0800;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); filter: none; }

  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #922b21);
    color: white;
  }

  .msg {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.78rem;
    margin-bottom: 1rem;
    display: none;
  }

  .msg.error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; display: block; }
  .msg.success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); color: #2ecc71; display: block; }

  /* APP SCREEN */
  #app-screen { display: none; min-height: 100vh; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
  }

  .topbar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold2);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .btn-logout {
    padding: 0.4rem 0.9rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  .app-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--gold2);
  }

  .btn-add {
    padding: 0.5rem 1.2rem;
    background: linear-gradient(135deg, var(--gold), #a8863a);
    border: none;
    border-radius: 8px;
    color: #0a0800;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-add:hover { filter: brightness(1.1); }

  /* NEW SECRET FORM */
  .new-secret-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .new-secret-form.open { display: block; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .form-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
  .form-actions .btn { margin-top: 0; }

  /* SECRETS GRID */
  .secrets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .secret-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .secret-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .secret-card:hover { border-color: rgba(201,168,76,0.3); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .secret-card:hover::before { opacity: 1; }

  .card-type {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .card-type.password { color: var(--gold); }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .card-date {
    font-size: 0.68rem;
    color: var(--muted);
  }

  .card-fav {
    position: absolute;
    top: 1rem; right: 1rem;
    color: var(--gold);
    font-size: 0.9rem;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.85rem; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    z-index: 100;
    display: none;
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 500px;
    animation: fadeUp 0.3s ease both;
    position: relative;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold2);
    margin-bottom: 1.5rem;
  }

  .secret-content-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-size: 0.85rem;
    word-break: break-all;
    margin-bottom: 1.5rem;
    position: relative;
    min-height: 60px;
  }

  .copy-hint {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    margin-top: 0.4rem;
    letter-spacing: 0.05em;
  }

  .modal-actions { display: flex; gap: 0.75rem; }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.3rem;
  }

  .modal-close:hover { color: var(--text); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .loading { opacity: 0.5; pointer-events: none; }

  /* Copied flash */
  .copied-flash {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #0a0800;
    padding: 0.6rem 1.4rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    z-index: 200;
    animation: fadeUp 0.2s ease, fadeOut 0.3s ease 1.5s both;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(-50%) translateY(10px); }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>O Cofre Digital</h1>
      <p></p>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
      <button class="tab-btn" onclick="switchTab('register')">Criar Conta</button>
    </div>

    <div id="auth-msg"></div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn" onclick="doLogin()">Abrir o Cofre</button>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="reg-name" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="reg-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn" onclick="doRegister()">Criar Conta</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">🔐 <span>O Cofre Digital</span></div>
    <div class="topbar-user">
      <span id="user-name-display"></span>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="app-body">
    <div class="section-header">
      <h2 class="section-title">Seus Segredos</h2>
      <button class="btn-add" onclick="toggleNewForm()">+ Novo Segredo</button>
    </div>

    <!-- NEW SECRET FORM -->
    <div class="new-secret-form" id="new-form">
      <div id="form-msg"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Título</label>
          <input type="text" id="s-title" placeholder="Ex: Senha do Wi-Fi">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="s-type">
            <option value="password">🔑 Senha</option>
            <option value="note">📝 Anotação</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Conteúdo Secreto</label>
        <textarea id="s-content" placeholder="O conteúdo será criptografado antes de salvar..."></textarea>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="s-fav" style="width:auto;margin-right:0.4rem"> ⭐ Marcar como favorito
        </label>
      </div>
      <div class="form-actions">
        <button class="btn" style="flex:1" onclick="saveSecret()">Guardar no Cofre</button>
        <button class="btn btn-ghost" style="flex:0.4" onclick="toggleNewForm()">Cancelar</button>
      </div>
    </div>

    <!-- SECRETS LIST -->
    <div class="secrets-grid" id="secrets-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';
  let token = localStorage.getItem('cofre_token');
  let currentUser = JSON.parse(localStorage.getItem('cofre_user') || 'null');

  // ── Init ───────────────────────────────────────────────────
  if (token && currentUser) showApp();

  // ── Auth ───────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
    clearMsg('auth-msg');
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showMsg('auth-msg', 'Preencha todos os campos.', 'error');

    try {
      const res = await api('/auth/login', 'POST', { email, password });
      token = res.data.token;
      currentUser = res.data.user;
      localStorage.setItem('cofre_token', token);
      localStorage.setItem('cofre_user', JSON.stringify(currentUser));
      showApp();
    } catch (e) {
      showMsg('auth-msg', e.message, 'error');
    }
  }

  async function doRegister() {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    if (!name || !email || !password) return showMsg('auth-msg', 'Preencha todos os campos.', 'error');

    try {
      await api('/auth/register', 'POST', { name, email, password });
      showMsg('auth-msg', 'Conta criada! Faça login.', 'success');
      switchTab('login');
      document.getElementById('login-email').value = email;
    } catch (e) {
      showMsg('auth-msg', e.message, 'error');
    }
  }

  function doLogout() {
    token = null; currentUser = null;
    localStorage.removeItem('cofre_token');
    localStorage.removeItem('cofre_user');
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  }

  // ── App ────────────────────────────────────────────────────
  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-name-display').textContent = currentUser?.name || '';
    loadSecrets();
  }

  async function loadSecrets() {
    const grid = document.getElementById('secrets-grid');
    grid.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Carregando...</p></div>';
    try {
      const res = await api('/secrets', 'GET');
      renderSecrets(res.data);
    } catch (e) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  function renderSecrets(secrets) {
    const grid = document.getElementById('secrets-grid');
    if (!secrets || secrets.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">🔒</div><p>Nenhum segredo guardado ainda.<br>Clique em "Novo Segredo" para começar.</p></div>';
      return;
    }
    grid.innerHTML = secrets.map((s, i) => `
      <div class="secret-card" onclick="revealSecret(${s.id})" style="animation-delay:${i * 0.05}s">
        ${s.is_favorite ? '<div class="card-fav">⭐</div>' : ''}
        <div class="card-type ${s.type}">${s.type === 'password' ? '🔑 Senha' : '📝 Anotação'}</div>
        <div class="card-title">${escHtml(s.title)}</div>
        <div class="card-date">${formatDate(s.updated_at)}</div>
      </div>
    `).join('');
  }

  async function revealSecret(id) {
    openModal('Carregando...', '<div style="text-align:center;padding:1rem;color:var(--muted)">Descriptografando...</div>', '');
    try {
      const res = await api(`/secrets/${id}`, 'GET');
      const s = res.data;
      document.getElementById('modal-title').textContent = s.title;
      document.getElementById('modal-body').innerHTML = `
        <div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem">${s.type === 'password' ? '🔑 Senha' : '📝 Anotação'}</div>
        <div class="secret-content-box" id="secret-text">${escHtml(s.content)}</div>
        <div class="copy-hint">clique no conteúdo para copiar</div>
      `;
      document.getElementById('secret-text').onclick = () => copyText(s.content);
      document.getElementById('modal-actions').innerHTML = `
        <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Fechar</button>
        <button class="btn btn-danger" style="flex:0.6" onclick="deleteSecret(${s.id})">Excluir</button>
      `;
    } catch (e) {
      document.getElementById('modal-body').innerHTML = `<div class="msg error">${e.message}</div>`;
    }
  }

  async function deleteSecret(id) {
    if (!confirm('Tem certeza que deseja remover este segredo?')) return;
    try {
      await api(`/secrets/${id}`, 'DELETE');
      closeModal();
      loadSecrets();
      flash('Segredo removido do cofre.');
    } catch (e) {
      alert(e.message);
    }
  }

  function toggleNewForm() {
    const f = document.getElementById('new-form');
    f.classList.toggle('open');
    clearMsg('form-msg');
  }

  async function saveSecret() {
    const title = document.getElementById('s-title').value;
    const content = document.getElementById('s-content').value;
    const type = document.getElementById('s-type').value;
    const is_favorite = document.getElementById('s-fav').checked;

    if (!title || !content) return showMsg('form-msg', 'Título e conteúdo são obrigatórios.', 'error');

    try {
      await api('/secrets', 'POST', { title, content, type, is_favorite });
      document.getElementById('s-title').value = '';
      document.getElementById('s-content').value = '';
      document.getElementById('s-fav').checked = false;
      toggleNewForm();
      loadSecrets();
      flash('Segredo guardado no cofre!');
    } catch (e) {
      showMsg('form-msg', e.message, 'error');
    }
  }

  // ── Modal ──────────────────────────────────────────────────
  function openModal(title, body, actions) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('modal-actions').innerHTML = actions;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // ── Helpers ────────────────────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(API + path, opts);
    const data = await res.json();

    if (data.error) throw new Error(data.message || 'Erro desconhecido.');
    return data;
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `msg ${type}`;
  }

  function clearMsg(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.className = 'msg';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(str) {
    if (!str) return '';
    return new Date(str.replace(' ', 'T')).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => flash('Copiado!'));
  }

  function flash(msg) {
    const el = document.createElement('div');
    el.className = 'copied-flash';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('tab-login').style.display !== 'none' && document.getElementById('auth-screen').style.display !== 'none') doLogin();
  });
</script>
</body>
</html>
